name: Bug report
description: Report something that is broken or surprising.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS, Linux, Windows
  - type: input
    id: terminal
    attributes:
      label: Terminal
      placeholder: Ghostty, iTerm2, Terminal.app, Windows Terminal, Alacritty
  - type: input
    id: git-version
    attributes:
      label: Git version
      placeholder: git version 2.x.x
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include commands or repository state when possible.
